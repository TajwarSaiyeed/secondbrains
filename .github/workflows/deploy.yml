name: CI/CD Pipeline - Build and Deploy MindMesh

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mindmesh
  AWS_REGION: us-east-1
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USERNAME: ${{ secrets.EC2_USERNAME }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Create application directory
            sudo mkdir -p /opt/mindmesh
            cd /opt/mindmesh

            # Create production environment file
            sudo tee .env.production > /dev/null <<EOF
            # Database Configuration
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}

            # NextAuth Configuration  
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}

            # Gemini AI API Configuration
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GOOGLE_API_KEY=${{ secrets.GEMINI_API_KEY }}

            # Email Configuration (Optional)
            EMAIL_SERVER_HOST=smtp.gmail.com
            EMAIL_SERVER_PORT=587
            EMAIL_SERVER_USER=${{ secrets.EMAIL_SERVER_USER }}
            EMAIL_SERVER_PASSWORD=${{ secrets.EMAIL_SERVER_PASSWORD }}
            EMAIL_FROM=${{ secrets.EMAIL_SERVER_USER }}

            # Application Environment
            NODE_ENV=production
            EOF

            # Set secure permissions
            sudo chmod 600 .env.production

            # Stop existing containers
            sudo docker compose down || true

            # Pull latest images
            sudo docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Create docker-compose.yml for production
            sudo tee docker-compose.yml > /dev/null <<EOF
            services:
              postgres:
                image: postgres:15-alpine
                container_name: mindmesh-postgres
                restart: unless-stopped
                environment:
                  POSTGRES_USER: \${POSTGRES_USER}
                  POSTGRES_PASSWORD: \${POSTGRES_PASSWORD}
                  POSTGRES_DB: \${POSTGRES_DB}
                  POSTGRES_HOST_AUTH_METHOD: trust
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                networks:
                  - mindmesh-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U \${POSTGRES_USER} -d \${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              app:
                image: ${{ env.DOCKER_IMAGE }}:latest
                container_name: mindmesh-app
                restart: unless-stopped
                env_file:
                  - .env.production
                environment:
                  DATABASE_URL: postgresql://\${POSTGRES_USER}:\${POSTGRES_PASSWORD}@postgres:5432/\${POSTGRES_DB}
                ports:
                  - "80:3000"
                volumes:
                  - app_uploads:/app/uploads
                depends_on:
                  postgres:
                    condition: service_healthy
                networks:
                  - mindmesh-network

            volumes:
              postgres_data:
                driver: local
              app_uploads:
                driver: local

            networks:
              mindmesh-network:
                driver: bridge
            EOF

            # Create startup script
            sudo tee start.sh > /dev/null <<'STARTEOF'
            #!/bin/bash
            set -e

            echo "🔍 Checking database connection..."
            echo "DATABASE_URL: $DATABASE_URL"

            echo "🔄 Running database migrations..."
            npx prisma migrate deploy

            echo "🚀 Starting MindMesh application..."
            exec node server.js
            STARTEOF

            sudo chmod +x start.sh

            # Start services
            sudo docker compose up -d

            # Show status
            sudo docker compose ps

            # Check container logs for any immediate errors
            echo "🔍 Checking application logs..."
            sudo docker compose logs app --tail=50

            # Wait a bit for services to fully start
            echo "⏳ Waiting for services to initialize..."
            sleep 30

            # Check if containers are still running
            echo "📊 Final container status:"
            sudo docker compose ps

            echo "✅ Deployment completed successfully!"

      - name: Health Check
        run: |
          echo "⏳ Waiting for application to be ready..."
          sleep 60

          # Check if the application is responding
          health_url="http://${{ secrets.EC2_HOST }}/api/health"
          echo "Checking health endpoint: $health_url"

          response=$(curl -s -o /dev/null -w "%{http_code}" "$health_url" || echo "000")

          if [ "$response" = "200" ]; then
            echo "✅ Application is healthy and responding!"
            curl -s "$health_url" | jq '.' || echo "Health check passed"
          else
            echo "❌ Application health check failed (HTTP $response)"
            echo "Trying root endpoint..."
            root_response=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}" || echo "000")
            echo "Root endpoint response: $root_response"
            exit 1
          fi

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()

    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 MindMesh deployment successful!"
          echo "📦 Docker image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "🌐 Live at: http://${{ secrets.EC2_HOST }}"

      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ MindMesh deployment failed!"
          echo "Check the logs above for details."
          exit 1
