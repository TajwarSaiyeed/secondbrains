version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secondbrains-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: localUser
      POSTGRES_PASSWORD: localPassword123
      POSTGRES_DB: secondbrainsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - secondbrains-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localUser -d secondbrainsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: tajwarsaiyeed/secondbrains-app:latest
    container_name: secondbrains-app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://localUser:localPassword123@postgres:5432/secondbrainsdb
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - secondbrains-network

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local

networks:
  secondbrains-network:
    driver: bridge
