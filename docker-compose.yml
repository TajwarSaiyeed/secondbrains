services:
  postgres:
    image: postgres:15-alpine
    container_name: mindmesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: USERNAME
      POSTGRES_PASSWORD: PASSWORD
      POSTGRES_DB: mindmeshdb
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mindmesh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U USERNAME -d mindmeshdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MindMesh Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindmesh-app
    restart: unless-stopped
    env_file:
      - .env.local 
    environment:
      DATABASE_URL: postgresql://USERNAME:PASSWORD@postgres:5432/mindmeshdb
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mindmesh-network

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local

networks:
  mindmesh-network:
    driver: bridge