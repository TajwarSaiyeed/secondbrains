version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mindmesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: REDUCTED
      POSTGRES_PASSWORD: REDUCTED
      POSTGRES_DB: mindmeshdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindmesh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U REDUCTED -d mindmeshdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: tajwarsaiyeed/mindmesh-app:latest
    container_name: mindmesh-app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://REDUCTED:REDUCTED@postgres:5432/mindmeshdb
      NODE_ENV: production
      NEXTAUTH_URL: REDUCTED
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mindmesh-network

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local

networks:
  mindmesh-network:
    driver: bridge
